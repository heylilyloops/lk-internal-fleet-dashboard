<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SILK — Support Delivery LK Internal Fleet NDC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sw:224px;--navy:#0b1c36;--navy2:#112240;--navy3:#162d4a;--blue:#266CA9;--blue2:#1d5a91;--blue3:#3d82be;--bg:#f0f4f9;--surface:#fff;--muted:#637d9a;--border:#dce6f0;--border2:#c5d8ec;--txt:#0d2137;--txt2:#3a5472;--teal:#00c49a;--orange:#f5a623;--cyan:#5ba4f5;--green:#22a06b;--red:#e24b4b;--yellow:#f59e0b;--font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;}
body{font-family:var(--font);background:var(--bg);color:var(--txt);display:flex;height:100vh;overflow:hidden;font-size:13px}
.sb{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto}
.sb::-webkit-scrollbar{width:3px}.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.sb-logo{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.sb-icon{width:36px;height:36px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;letter-spacing:-.5px;flex-shrink:0;font-family:var(--mono)}
.sb-brand{flex:1;min-width:0}
.sb-brand-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}
.sb-brand-sub{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.9px;margin-top:1px;line-height:1.3}
.sb-section{padding:14px 14px 5px;font-size:9px;font-weight:600;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:1.2px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent;transition:all .15s}
.sb-item:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.sb-item.active{color:#fff;background:rgba(38,108,169,.2);border-left-color:var(--blue)}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:9.5px;padding:2px 7px;border-radius:10px;font-weight:600;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.sb-item.active .sb-badge{background:var(--blue);color:#fff}
.sb-divider{height:1px;background:rgba(255,255,255,.06);margin:6px 12px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar-left h1{font-size:14px;font-weight:700;color:var(--txt);letter-spacing:-.2px}
.topbar-left p{font-size:10px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.chip{background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--txt2);font-weight:500;white-space:nowrap}
.chip.hi{background:#dcfff4;border-color:#86efcb;color:#065f46}
.chip.lo{background:#fff1f2;border-color:#fca5a5;color:#991b1b}
.chip.neu{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.view-toggle{display:flex;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:3px;gap:2px}
.vtab{padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;color:var(--muted);font-weight:500;border:none;background:transparent;transition:all .14s}
.vtab.active{background:var(--surface);color:var(--blue);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.date-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.date-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.date-inputs{display:flex;align-items:center;gap:8px}
.date-input-wrap{display:flex;flex-direction:column;gap:2px}
.date-input-wrap label{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input[type=date]{background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:5px 10px;font-size:11.5px;color:var(--txt);font-family:var(--font);cursor:pointer;outline:none;font-weight:500}
input[type=date]:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(38,108,169,.15)}
.date-sep{font-size:11px;color:var(--muted);padding:0 2px}
.date-quick{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px}
.dq{padding:4px 11px;border-radius:6px;font-size:11px;cursor:pointer;color:var(--muted);font-weight:500;border:none;background:transparent;transition:all .14s;white-space:nowrap}
.dq:hover{color:var(--txt);background:rgba(0,0,0,.04)}
.dq.active{background:var(--surface);color:var(--blue);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.date-count{font-size:10px;color:var(--muted);margin-left:auto;white-space:nowrap}
.date-count b{color:var(--txt2)}
.content{flex:1;overflow-y:auto;padding:16px 20px 28px}
.content::-webkit-scrollbar{width:5px}.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 15px;position:relative;overflow:hidden;transition:box-shadow .15s}
.kpi:hover{box-shadow:0 2px 12px rgba(38,108,169,.1)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.c1::before{background:var(--blue)}.kpi.c2::before{background:var(--teal)}.kpi.c3::before{background:var(--orange)}.kpi.c4::before{background:#8b6cf7}.kpi.c5::before{background:var(--green)}.kpi.c6::before{background:var(--red)}
.klbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.kval{font-size:21px;font-weight:700;color:var(--txt);line-height:1;letter-spacing:-.4px;font-family:var(--mono)}
.ksub{font-size:10px;color:var(--muted);margin-top:4px}
.alert-banner{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.alert-banner.kritis{background:#fff1f2;border-color:#fca5a5}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.alert-content{flex:1}
.alert-title{font-size:11px;font-weight:700;color:#7c2d12;margin-bottom:4px}
.alert-banner.kritis .alert-title{color:#991b1b}
.alert-items{display:flex;flex-wrap:wrap;gap:6px}
.alert-tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500}
.alert-tag.kritis{background:#fee2e2;color:#991b1b}
.alert-tag.warning{background:#ffedd5;color:#92400e}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 16px}
.ctitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.ctitle-badge{font-size:9px;padding:2px 7px;border-radius:6px;background:var(--bg);color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:9px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.ls{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.mom-table{width:100%;border-collapse:collapse;font-size:12px}
.mom-table th{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:4px 8px;text-align:right;border-bottom:1px solid var(--border);font-weight:600}
.mom-table th:first-child{text-align:left}
.mom-table td{padding:7px 8px;border-bottom:1px solid #f0f4f9;vertical-align:middle;color:var(--txt)}
.mom-table tr:last-child td{border-bottom:none}
.mom-table tr:hover td{background:var(--bg)}
.site-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px 16px;border-top:3px solid var(--blue);position:relative;overflow:hidden;transition:box-shadow .15s}
.scard:hover{box-shadow:0 4px 16px rgba(38,108,169,.12)}
.scard-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.scard-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.scard-trip{font-size:18px;font-weight:700;color:var(--txt);font-family:var(--mono);margin-top:2px;letter-spacing:-.5px}
.scard-sub{font-size:10px;color:var(--muted);margin-top:2px}
.pct-big{font-size:24px;font-weight:800;padding:6px 12px;border-radius:10px;line-height:1;font-family:var(--mono)}
.scard-tbl{width:100%;border-collapse:collapse;margin-top:10px;font-size:11px}
.scard-tbl th{font-size:9px;color:var(--muted);text-transform:uppercase;padding:2px 4px;text-align:right;border-bottom:1px solid var(--border);font-weight:600}
.scard-tbl th:first-child{text-align:left}
.scard-tbl td{padding:4px 4px;border-bottom:1px solid #f5f7fa;vertical-align:middle}
.scard-tbl tr:last-child td{border-bottom:none}
.scard-footer{display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--muted)}
.scard-footer b{color:var(--txt2)}
.scard-alert{position:absolute;top:12px;right:12px;font-size:9px;padding:2px 6px;border-radius:6px;font-weight:700}
.scard-alert.k{background:#fee2e2;color:#991b1b}
.scard-alert.w{background:#ffedd5;color:#92400e}
.prov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.prov-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 16px}
.prov-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.prov-site-name{font-size:12px;font-weight:700;color:var(--txt)}
.prov-pct-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.prov-tbl{width:100%;border-collapse:collapse;font-size:11px}
.prov-tbl th{font-size:9px;color:var(--muted);text-transform:uppercase;padding:3px 5px;text-align:right;border-bottom:1px solid var(--border);font-weight:600}
.prov-tbl th:first-child{text-align:left}
.prov-tbl td{padding:5px 5px;border-bottom:1px solid #f5f7fa;vertical-align:middle}
.prov-tbl tr:last-child td{border-bottom:none;font-weight:700;color:var(--txt)}
.prov-tbl tr:hover td{background:var(--bg)}
.prov-bar-wrap{width:60px;height:4px;background:var(--border);border-radius:2px;display:inline-block;vertical-align:middle;margin-right:4px}
.prov-bar-fill{height:100%;border-radius:2px}
.jalur-wrap{overflow-x:auto}
.jtbl{width:100%;border-collapse:collapse;font-size:11.5px;min-width:600px}
.jtbl th{font-size:9px;color:var(--muted);text-transform:uppercase;padding:6px 10px;text-align:right;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap;background:var(--bg)}
.jtbl th:first-child,.jtbl th:nth-child(2),.jtbl th:nth-child(3){text-align:left}
.jtbl td{padding:7px 10px;border-bottom:1px solid #f0f4f9;vertical-align:middle;color:var(--txt)}
.jtbl tr:last-child td{border-bottom:none}
.jtbl tr:hover td{background:var(--bg)}
.jtbl tr.row-kritis td{background:#fff5f5}
.jtbl tr.row-warning td{background:#fffbeb}
.mono{font-family:var(--mono);font-size:11px}
.pos{color:var(--green);font-weight:600}.neg{color:var(--red);font-weight:600}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;display:inline-block}
.phi{background:#dbeeff;color:#1e40af}.pmi{background:#dcfce7;color:#166534}.plo{background:#fff7ed;color:#92400e}.pvlo{background:#fff1f2;color:#991b1b}
.vis-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.vis-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px 16px;position:relative;overflow:hidden}
.vis-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.vis-header{margin-bottom:10px}
.vis-site{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.vis-trip-line{display:flex;align-items:center;justify-content:space-between;gap:8px}
.vis-trip-count{font-size:15px;font-weight:700;color:var(--txt);font-family:var(--mono);letter-spacing:-.3px}
.vis-pct-badge{font-size:13px;font-weight:800;padding:5px 10px;border-radius:9px;font-family:var(--mono);flex-shrink:0}
.vis-rate{font-size:10px;color:var(--muted);margin-top:3px}
.vis-divider{height:1px;background:var(--border);margin:10px 0}
.vis-tbl{width:100%;border-collapse:collapse;font-size:11.5px}
.vis-tbl th{font-size:9px;color:var(--muted);text-transform:uppercase;padding:3px 4px;border-bottom:1px solid var(--border);font-weight:600}
.vis-tbl th:first-child{text-align:left}
.vis-tbl th:last-child{text-align:right}
.vis-tbl td{padding:5px 4px;border-bottom:1px solid #f5f7fa;vertical-align:middle;font-size:11px}
.vis-tbl tr:last-child td{border-bottom:none}
.vis-tbl tr:hover td{background:var(--bg)}
.vis-jalur{font-weight:600;color:var(--txt)}
.vis-area{font-size:10px;color:var(--muted)}
.vis-cost{font-family:var(--mono);text-align:right;color:var(--txt2)}
.vis-saving-pos{font-family:var(--mono);text-align:right;font-weight:700;color:var(--green)}
.vis-saving-neg{font-family:var(--mono);text-align:right;font-weight:700;color:var(--red)}
.vis-bar-track{height:3px;background:var(--border);border-radius:2px;margin-top:3px}
.vis-bar-fill{height:3px;border-radius:2px}
.vis-footer{display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--muted)}
.vis-footer b{color:var(--txt2);font-family:var(--mono)}
/* EXPANDABLE CONTRIB TABLE v2.4 */
.contrib-wrap{overflow-x:auto}
.contrib-tbl{width:100%;border-collapse:collapse;font-size:11.5px;min-width:680px}
.contrib-tbl th{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:5px 10px;text-align:right;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap;background:var(--bg)}
.contrib-tbl th:first-child{text-align:left}
.contrib-tbl td{padding:6px 10px;border-bottom:.5px solid #f0f4f9;vertical-align:middle}
.row-area-g{cursor:pointer}
.row-area-g td{background:var(--bg);font-weight:600}
.row-area-g:hover td{filter:brightness(.97)}
.area-cell-inner{display:flex;align-items:center;gap:8px}
.toggle-ch{font-size:13px;color:var(--muted);transition:transform .18s;display:inline-block;line-height:1;flex-shrink:0;font-weight:400}
.toggle-ch.open{transform:rotate(90deg)}
.row-jalur-g td{background:var(--surface)}
.row-jalur-g td:first-child{padding-left:30px}
.row-jalur-g:hover td{background:var(--bg)}
.row-jalur-g.hidden{display:none}
.jalur-chip{background:var(--border);color:var(--txt2);border-radius:4px;padding:1px 7px;font-size:10px;font-weight:600;display:inline-block}
canvas{display:block}
.no-data{padding:32px;text-align:center;color:var(--muted);font-size:12px}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}.site-cards,.prov-grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sb">
  <div class="sb-logo">
    <div class="sb-icon">SILK</div>
    <div class="sb-brand">
      <div class="sb-brand-name">SILK Dashboard</div>
      <div class="sb-brand-sub">Support Delivery LK<br>Internal Fleet NDC · Corp</div>
    </div>
  </div>
  <div class="sb-section">Overview</div>
  <button class="sb-item active" data-site="all" onclick="navTo('all')">
    <span class="sb-dot" style="background:#266CA9"></span>Semua NDC
    <span class="sb-badge" id="badge-all">—</span>
  </button>
  <div class="sb-divider"></div>
  <div class="sb-section">NDC Sites</div>
  <button class="sb-item" data-site="AHI Jababeka" onclick="navTo('AHI Jababeka')">
    <span class="sb-dot" style="background:#f5a623"></span>AHI Jababeka
    <span class="sb-badge" id="badge-AHI Jababeka">—</span>
  </button>
  <button class="sb-item" data-site="HCI Jababeka" onclick="navTo('HCI Jababeka')">
    <span class="sb-dot" style="background:#5ba4f5"></span>HCI Jababeka
    <span class="sb-badge" id="badge-HCI Jababeka">—</span>
  </button>
  <button class="sb-item" data-site="HCI Cikupa" onclick="navTo('HCI Cikupa')">
    <span class="sb-dot" style="background:#00c49a"></span>HCI Cikupa
    <span class="sb-badge" id="badge-HCI Cikupa">—</span>
  </button>
  <button class="sb-item" data-site="Corp Sidoarjo" onclick="navTo('Corp Sidoarjo')">
    <span class="sb-dot" style="background:#8b6cf7"></span>Corp Sidoarjo
    <span class="sb-badge" id="badge-Corp Sidoarjo">—</span>
  </button>
  <div class="sb-divider"></div>
  <div class="sb-section">Info</div>
  <div style="padding:8px 14px 4px;font-size:10px;color:rgba(255,255,255,.3);line-height:1.6">
    Data: Jan–Mei 2026<br>
    Raw: <span id="infoRows">—</span> trips<br>
    <span style="color:rgba(255,255,255,.15)">v2.4 · Kawan Lama Group</span>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h1 id="mainTitle">Overview — Semua NDC</h1>
      <p id="mainSub">Monitoring armada internal luar kota</p>
    </div>
    <div class="topbar-right">
      <div class="view-toggle">
        <button class="vtab active" onclick="setView('mgmt')">📊 Management</button>
        <button class="vtab" onclick="setView('ops')">🔍 Operational</button>
      </div>
      <span class="chip neu" id="chipTrip">—</span>
      <span class="chip" id="chipPct">—</span>
      <span class="chip" id="chipSav">—</span>
    </div>
  </div>
  <div class="date-bar">
    <div class="date-label">Delivery Date</div>
    <div class="date-inputs">
      <div class="date-input-wrap"><label>Dari</label><input type="date" id="dateFrom" onchange="onDateChange()"></div>
      <div class="date-sep" style="margin-top:14px">→</div>
      <div class="date-input-wrap"><label>Sampai</label><input type="date" id="dateTo" onchange="onDateChange()"></div>
    </div>
    <div class="date-quick" id="quickBtns"></div>
    <div class="date-count" id="dateCount"></div>
  </div>
  <div class="content" id="content"></div>
</div>
<script>
__DATA_BLOCK__
const NDC=['AHI Jababeka','HCI Jababeka','HCI Cikupa','Corp Sidoarjo'];
const SCOL={'AHI Jababeka':'#f5a623','HCI Jababeka':'#5ba4f5','HCI Cikupa':'#00c49a','Corp Sidoarjo':'#8b6cf7'};
const SSHORT={'AHI Jababeka':'AHI JBBK','HCI Jababeka':'HCI JBBK','HCI Cikupa':'HCI CKP','Corp Sidoarjo':'Corp SDJ'};
const ACOLS=['#1a3a5c','#266CA9','#4a90c4','#6aadde','#a8cde8'];
const CGREEN='var(--green)',CRED='var(--red)';
const DAY_LABELS=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
let activeSite='all',activeView='mgmt',CH={};
let dateFrom='',dateTo='';
function fmt(n){return Math.round(n).toLocaleString('id-ID')}
function fmtJt(n){const a=Math.abs(n);return(n<0?'-':'')+(a>=1e9?(a/1e9).toFixed(2)+' M':(a>=1e6?(a/1e6).toFixed(1)+' Jt':(a/1e3).toFixed(0)+' Rb'))}
function fmtM(v){return fmtJt(v)}
function pc(p){return p>=50?'phi':p>=25?'pmi':p>=10?'plo':'pvlo'}
function dc(id){if(CH[id]){CH[id].destroy();delete CH[id];}}
function getRows(){
  let rows=RAW;
  if(activeSite!=='all') rows=rows.filter(r=>r[0]===activeSite);
  if(dateFrom) rows=rows.filter(r=>r[7]>=dateFrom);
  if(dateTo) rows=rows.filter(r=>r[7]<=dateTo);
  return rows;
}
function calcKpi(rows){
  const tCI=rows.reduce((s,r)=>s+(r[3]||0),0);
  const tCE=rows.filter(r=>r[4]).reduce((s,r)=>s+(r[4]||0),0);
  const tDO=rows.reduce((s,r)=>s+(r[8]||0),0);
  const tCBM=rows.reduce((s,r)=>s+(r[9]||0),0);
  return{trips:rows.length,tCI,tCE,tDO,tCBM,sav:tCE-tCI};
}
function calcJalur(rows){
  const map={};
  rows.forEach(r=>{
    const k=r[2];
    if(!map[k]) map[k]={j:r[2],area:r[1],t:0,ci:0,ce:0,ceCount:0};
    map[k].t++;map[k].ci+=r[3]||0;map[k].ce+=r[4]||0;
    if(r[4]) map[k].ceCount++;
  });
  return Object.values(map).map(j=>{
    const ci=j.ci/1e6;
    const ce=j.ceCount>0?j.ce/1e6:null;
    const gap=ce!==null?+(ce-ci).toFixed(1):null;
    const pct_ef=ce&&ci?+((ce-ci)/ci*100).toFixed(1):null;
    const alert=pct_ef!==null?(pct_ef<-15?'kritis':pct_ef<0?'warning':null):null;
    return{j:j.j,area:j.area,t:j.t,ci:+ci.toFixed(1),ce:ce!==null?+ce.toFixed(1):null,gap,pct_ef,alert};
  }).sort((a,b)=>b.t-a.t);
}
function calcContrib(rows){
  const intMap={};
  rows.forEach(r=>{if(!intMap[r[1]]) intMap[r[1]]=0;intMap[r[1]]++;});
  const activeMonths=new Set(rows.map(r=>r[7].slice(0,7)));
  const MN={'01':'January','02':'February','03':'March','04':'April','05':'May'};
  const activeMonthNames=new Set([...activeMonths].map(m=>MN[m.slice(5)]));
  let extFilter=EXT_AGG;
  if(activeSite!=='all') extFilter=extFilter.filter(e=>e.site===activeSite);
  extFilter=extFilter.filter(e=>activeMonthNames.has(e.month));
  const extMap={};
  extFilter.forEach(e=>{extMap[e.area]=(extMap[e.area]||0)+e.trips;});
  const areas=new Set([...Object.keys(intMap),...Object.keys(extMap)]);
  return[...areas].map(a=>({area:a,int:intMap[a]||0,ext:extMap[a]||0,total:(intMap[a]||0)+(extMap[a]||0)})).sort((a,b)=>b.total-a.total);
}
// ── EXPANDABLE CONTRIB per AREA+JALUR ────────────────────────────
function calcContribExpandable(rows){
  const areaMap={};
  rows.forEach(r=>{
    const area=r[1],jalur=r[2];
    if(!areaMap[area]) areaMap[area]={int:0,ci:0,ce:0,ceCnt:0,jalurs:{}};
    areaMap[area].int++;areaMap[area].ci+=r[3]||0;
    if(r[4]){areaMap[area].ce+=r[4];areaMap[area].ceCnt++;}
    if(!areaMap[area].jalurs[jalur]) areaMap[area].jalurs[jalur]={int:0,ci:0,ce:0,ceCnt:0};
    areaMap[area].jalurs[jalur].int++;areaMap[area].jalurs[jalur].ci+=r[3]||0;
    if(r[4]){areaMap[area].jalurs[jalur].ce+=r[4];areaMap[area].jalurs[jalur].ceCnt++;}
  });
  const activeMonths=new Set(rows.map(r=>r[7].slice(0,7)));
  const MN={'01':'January','02':'February','03':'March','04':'April','05':'May'};
  const activeMonthNames=new Set([...activeMonths].map(m=>MN[m.slice(5)]));
  let extFilterArea=EXT_AGG;
  if(activeSite!=='all') extFilterArea=extFilterArea.filter(e=>e.site===activeSite);
  extFilterArea=extFilterArea.filter(e=>activeMonthNames.has(e.month));
  const extAreaMap={};
  extFilterArea.forEach(e=>{extAreaMap[e.area]=(extAreaMap[e.area]||0)+e.trips;});
  let extFilterJalur=EXT_JALUR;
  if(activeSite!=='all') extFilterJalur=extFilterJalur.filter(e=>e.site===activeSite);
  extFilterJalur=extFilterJalur.filter(e=>activeMonthNames.has(e.month));
  const extJalurMap={};
  extFilterJalur.forEach(e=>{const key=e.area+'||'+e.jalur;extJalurMap[key]=(extJalurMap[key]||0)+e.trips;});
  const allAreas=new Set([...Object.keys(areaMap),...Object.keys(extAreaMap)]);
  return[...allAreas].map(area=>{
    const v=areaMap[area]||{int:0,ci:0,ce:0,ceCnt:0,jalurs:{}};
    const jalurNames=new Set([...Object.keys(v.jalurs),...extFilterJalur.filter(e=>e.area===area).map(e=>e.jalur)]);
    const jalurs=[...jalurNames].map(jname=>{
      const jv=v.jalurs[jname]||{int:0,ci:0,ce:0,ceCnt:0};
      const extKey=area+'||'+jname;
      return{name:jname,int:jv.int,ext:extJalurMap[extKey]||0,total:jv.int+(extJalurMap[extKey]||0),ci:jv.ci,ce:jv.ceCnt>0?jv.ce:null};
    }).sort((a,b)=>b.total-a.total);
    return{area,int:v.int,ext:extAreaMap[area]||0,total:v.int+(extAreaMap[area]||0),ci:v.ci,ce:v.ceCnt>0?v.ce:null,jalurs};
  }).sort((a,b)=>b.total-a.total);
}
function renderContribExpandable(rows){
  const data=calcContribExpandable(rows);
  function fj(v){if(v===null||v===undefined) return '<span style="color:var(--muted)">—</span>';return (v/1e6).toFixed(1);}
  function savNom(ci,ce){if(ce===null||ce===undefined) return '<span style="color:var(--muted)">—</span>';const s=(ce-ci)/1e6;return `<span class="${s>=0?'pos':'neg'}">${s>=0?'+':''}${s.toFixed(1)}</span>`;}
  function savPct(ci,ce){if(ce===null||ce===undefined||ci===0) return '<span style="color:var(--muted)">—</span>';const s=((ce-ci)/ci*100);return `<span class="${s>=0?'pos':'neg'}">${s>=0?'+':''}${s.toFixed(1)}%</span>`;}
  function pcl(i,t){const p=t?Math.round(i/t*100):0;return{p,cls:p>=50?'phi':p>=25?'pmi':p>=10?'plo':'pvlo'};}
  let rows_html='';
  data.forEach((a,ai)=>{
    const{p,cls}=pcl(a.int,a.total);
    rows_html+=`<tr class="row-area-g" onclick="toggleContrib(${ai})">
      <td><div class="area-cell-inner"><span class="toggle-ch" id="tch-${ai}">›</span><span>${a.area}</span></div></td>
      <td style="text-align:right" class="mono">${fmt(a.int)}</td>
      <td style="text-align:right" class="mono">${fmt(a.ext)}</td>
      <td style="text-align:right" class="mono">${fmt(a.total)}</td>
      <td style="text-align:right"><span class="pill ${cls}">${p}%</span></td>
      <td style="text-align:right" class="mono">${fj(a.ci)}</td>
      <td style="text-align:right" class="mono">${fj(a.ce)}</td>
      <td style="text-align:right">${savNom(a.ci,a.ce)}</td>
    </tr>`;
    a.jalurs.forEach(j=>{
      const jPct=j.total?Math.round(j.int/j.total*100):0;
      const jCls=jPct>=50?'phi':jPct>=25?'pmi':jPct>=10?'plo':'pvlo';
      rows_html+=`<tr class="row-jalur-g hidden" data-cg="${ai}">
        <td><span class="jalur-chip">${j.name}</span></td>
        <td style="text-align:right" class="mono">${fmt(j.int)}</td>
        <td style="text-align:right" class="mono">${j.ext>0?fmt(j.ext):'<span style="color:var(--muted)">—</span>'}</td>
        <td style="text-align:right" class="mono">${fmt(j.total)}</td>
        <td style="text-align:right">${j.total>0?`<span class="pill ${jCls}">${jPct}%</span>`:'<span style="color:var(--muted)">—</span>'}</td>
        <td style="text-align:right" class="mono">${fj(j.ci)}</td>
        <td style="text-align:right" class="mono">${fj(j.ce)}</td>
        <td style="text-align:right">${savPct(j.ci,j.ce)}</td>
      </tr>`;
    });
  });
  return`<div class="card" style="margin-bottom:12px">
    <div class="ctitle">Kontribusi Internal per Area
      <span class="ctitle-badge">klik area untuk expand jalur · savings vs ext</span>
    </div>
    <div class="contrib-wrap">
    <table class="contrib-tbl">
      <thead><tr>
        <th style="min-width:160px;text-align:left">Area / Jalur</th>
        <th>INT Trip</th><th>EXT Trip</th><th>Total</th><th>% INT</th>
        <th>Cost Int (Jt)</th><th>Cost Ext (Jt)</th><th>Savings / %</th>
      </tr></thead>
      <tbody>${rows_html}</tbody>
    </table>
    </div>
  </div>`;
}
function toggleContrib(ai){
  const rows=document.querySelectorAll('[data-cg="'+ai+'"]');
  const icon=document.getElementById('tch-'+ai);
  const isOpen=icon.classList.contains('open');
  rows.forEach(r=>r.classList.toggle('hidden',isOpen));
  icon.classList.toggle('open',!isOpen);
}
function calcDailyAvg(rows){
  const dateMap={};
  rows.forEach(r=>{if(!dateMap[r[7]]) dateMap[r[7]]=0;dateMap[r[7]]++;});
  const dowCounts=[0,0,0,0,0,0,0];
  const dowDays=[0,0,0,0,0,0,0];
  Object.entries(dateMap).forEach(([d,cnt])=>{const dow=new Date(d).getDay();dowCounts[dow]+=cnt;dowDays[dow]++;});
  const order=[1,2,3,4,5,6,0];
  return order.map(i=>({label:DAY_LABELS[i],avg:dowDays[i]>0?+(dowCounts[i]/dowDays[i]).toFixed(1):0,isWeekend:i===0||i===6}));
}
function calcProvinsi(rows){
  const result={};
  NDC.forEach(s=>{result[s]={};});
  rows.forEach(r=>{const s=r[0],area=r[1];if(!result[s]) return;if(!result[s][area]) result[s][area]={int:0,ext:0};result[s][area].int++;});
  const activeMonths=new Set(rows.map(r=>r[7].slice(0,7)));
  const MN={'01':'January','02':'February','03':'March','04':'April','05':'May'};
  const activeMonthNames=new Set([...activeMonths].map(m=>MN[m.slice(5)]));
  EXT_AGG.filter(e=>activeMonthNames.has(e.month)).forEach(e=>{if(!result[e.site]) return;if(!result[e.site][e.area]) result[e.site][e.area]={int:0,ext:0};result[e.site][e.area].ext+=e.trips;});
  return result;
}
function calcVisibility(rows){
  const siteMap={};
  NDC.forEach(s=>siteMap[s]={});
  rows.forEach(r=>{const s=r[0],jalur=r[2],area=r[1];if(!siteMap[s]) return;const key=jalur;if(!siteMap[s][key]) siteMap[s][key]={jalur,area,trips:0,ci:0,ce:0,ceCnt:0};siteMap[s][key].trips++;siteMap[s][key].ci+=r[3]||0;if(r[4]){siteMap[s][key].ce+=r[4];siteMap[s][key].ceCnt++;}});
  const dates=new Set(rows.map(r=>r[7]));
  const dayCount=dates.size||1;
  const weekCount=dayCount/7;
  const result={};
  NDC.forEach(s=>{
    const jalurs=Object.values(siteMap[s]).filter(j=>j.trips>0).sort((a,b)=>b.ci-a.ci);
    const totCI=jalurs.reduce((s,j)=>s+j.ci,0);
    const totCE=jalurs.filter(j=>j.ceCnt>0).reduce((s,j)=>s+j.ce,0);
    const intTrips=jalurs.reduce((s,j)=>s+j.trips,0);
    const activeMonths=new Set(rows.map(r=>r[7].slice(0,7)));
    const MN={'01':'January','02':'February','03':'March','04':'April','05':'May'};
    const activeMonthNames=new Set([...activeMonths].map(m=>MN[m.slice(5)]));
    const extTrips=EXT_AGG.filter(e=>e.site===s&&activeMonthNames.has(e.month)).reduce((s,e)=>s+e.trips,0);
    const totalTrips=intTrips+extTrips;
    const pct=totalTrips?Math.round(intTrips/totalTrips*100):0;
    const ratePerDay=+(intTrips/dayCount).toFixed(1);
    const ratePerWeek=+(intTrips/weekCount).toFixed(1);
    const rateLabel=ratePerDay>=1?`${ratePerDay} unit/day`:`${ratePerWeek} unit/week`;
    result[s]={jalurs,totCI,totCE,intTrips,extTrips,totalTrips,pct,rateLabel,dayCount};
  });
  return result;
}

  if(activeView==='mgmt') renderManagement(rows,kpi,contrib,tInt,tAll,pct,sav);

    visHTML+=`<div class="vis-card" style="border-top:3px solid ${col}">
      <div class="vis-header">
        <div class="vis-site" style="color:${col}">${SSHORT[s]||s}</div>
        <div class="vis-trip-line">
          <div><div class="vis-trip-count">${vd.intTrips.toLocaleString('id-ID')}/${vd.totalTrips.toLocaleString('id-ID')} Trip</div><div class="vis-rate">${vd.rateLabel}</div></div>
          <div class="vis-pct-badge" style="${pctCls}">${vd.pct}%</div>
        </div>
      </div>
      <div class="vis-divider"></div>
      <table class="vis-tbl"><thead><tr><th>Jalur</th><th>Int (Rp Jt)</th><th>Saving</th></tr></thead><tbody>
      ${vd.jalurs.slice(0,8).map(j=>{const ci=j.ci/1e6;const ce=j.ceCnt>0?j.ce/1e6:null;const saving=ce!==null?+((j.ce-j.ci)/j.ci*100).toFixed(1):null;const barW=Math.round(j.ci/maxCI*100);return`<tr><td><div class="vis-jalur">${j.jalur}</div><div class="vis-area">${j.area}</div><div class="vis-bar-track"><div class="vis-bar-fill" style="width:${barW}%;background:${col}"></div></div></td><td class="vis-cost">${ci.toFixed(1)}</td><td class="${saving!==null?(saving>=0?'vis-saving-pos':'vis-saving-neg'):'vis-cost'}">${saving!==null?(saving>=0?'+':'')+saving+'%':'—'}</td></tr>`;}).join('')}
      </tbody></table>
      <div class="vis-footer"><span>Int: <b>Rp ${(vd.totCI/1e6).toFixed(1)} Jt</b></span><span>Ext: <b>Rp ${(vd.totCE/1e6).toFixed(1)} Jt</b></span></div>
    </div>`;
  });
  visHTML+='</div></div>';
  const chartMonthHTML=`<div class="row2">
    <div class="card" style="margin-bottom:0"><div class="ctitle">Savings vs External per Bulan <span class="ctitle-badge">Jt Rp</span></div><div style="position:relative;height:160px"><canvas id="cSav"></canvas></div></div>
    <div class="card" style="margin-bottom:0"><div class="ctitle">Trip Internal per Bulan</div><div style="position:relative;height:160px"><canvas id="cTrip"></canvas></div></div>
  </div>`;
  const dailyData=calcDailyAvg(rows);
  const chartDayHTML=`<div class="card" style="margin-bottom:12px">
    <div class="ctitle">Rata-rata Trip Internal per Hari<div class="leg" style="margin-bottom:0;margin-left:8px"><span class="li"><span class="ls" style="background:#266CA9"></span>Hari Kerja</span><span class="li"><span class="ls" style="background:#a8cde8"></span>Weekend</span></div></div>
    <div style="position:relative;height:170px"><canvas id="cDay"></canvas></div>
  </div>`;
  const momHTML=`<div class="card" style="margin-bottom:12px">
    <div class="ctitle">Month-over-Month Summary <span class="ctitle-badge">${momRows.length} bulan</span></div>
    <table class="mom-table"><thead><tr><th>Bulan</th><th>Trip</th><th>MoM</th><th>Cost Int (Jt)</th><th>Cost Ext (Jt)</th><th>Savings (Jt)</th></tr></thead>
    <tbody>${momRows.map(m=>`<tr><td style="font-weight:600">${m.m}</td><td style="text-align:right;font-family:var(--mono)">${fmt(m.trips)}</td><td style="text-align:right">${m.prevTrips!=null?`<span class="${m.trips>=m.prevTrips?'pos':'neg'}">${m.trips>=m.prevTrips?'▲':'▼'}${Math.abs(m.trips-m.prevTrips)}</span>`:'<span style="color:var(--muted)">—</span>'}</td><td style="text-align:right;font-family:var(--mono)">${m.ci}</td><td style="text-align:right;font-family:var(--mono)">${m.ce!==null?m.ce:'<span style="color:var(--muted)">—</span>'}</td><td style="text-align:right;font-family:var(--mono);color:${m.sav>=0?CGREEN:CRED}">${m.sav>=0?'+':''}${m.sav}</td></tr>`).join('')}</tbody>
    </table>
  </div>`;
  const provData=calcProvinsi(rows);
  const sitesForProv=activeSite==='all'?NDC:[activeSite];
  let provHTML=`<div class="card" style="margin-bottom:12px"><div class="ctitle">Summary per Provinsi — Kontribusi Armada Internal<span class="ctitle-badge">ground truth int+ext</span></div><div class="leg" style="margin-bottom:10px"><span class="li"><span class="ls" style="background:#266CA9"></span>Internal</span><span class="li"><span class="ls" style="background:#a8cde8"></span>External</span></div><div class="prov-grid" style="grid-template-columns:repeat(${Math.min(sitesForProv.length,4)},1fr)">`;
  sitesForProv.forEach(s=>{
    const sdata=provData[s]||{};
    const areas=Object.entries(sdata).filter(([a,v])=>v.int>0||v.ext>0).sort((a,b)=>(b[1].int+b[1].ext)-(a[1].int+a[1].ext));
    const totInt=areas.reduce((s,[,v])=>s+v.int,0);
    const totExt=areas.reduce((s,[,v])=>s+v.ext,0);
    const totAll=totInt+totExt;
    const totPct=totAll?Math.round(totInt/totAll*100):0;
    const maxTotal=areas.reduce((m,[,v])=>Math.max(m,v.int+v.ext),1);
    const pctColor=totPct>=30?'background:#dcfff4;color:#065f46':totPct>=15?'background:#eff6ff;color:#1d4ed8':'background:#fff1f2;color:#991b1b';
    const intColor=SCOL[s]||'#266CA9';
    provHTML+=`<div class="prov-card"><div class="prov-card-head"><div class="prov-site-name" style="color:${intColor}">${SSHORT[s]||s}</div><span class="prov-pct-badge" style="${pctColor}">${totPct}% internal</span></div>
    <table class="prov-tbl"><thead><tr><th>Provinsi</th><th>INT</th><th>EXT</th><th>Total</th><th>%INT</th></tr></thead><tbody>
    ${areas.map(([area,v])=>{const total=v.int+v.ext;const p=total?Math.round(v.int/total*100):0;const barW=Math.round(total/maxTotal*100);const pCls=p>=50?'phi':p>=25?'pmi':p>=10?'plo':'pvlo';return`<tr><td><div style="font-weight:500;font-size:11px">${area}</div><div style="margin-top:3px"><span class="prov-bar-wrap"><span class="prov-bar-fill" style="width:${Math.round(v.int/Math.max(total,1)*barW)}%;background:${intColor}"></span></span></div></td><td style="text-align:right;font-family:var(--mono);color:${intColor};font-weight:600">${v.int}</td><td style="text-align:right;font-family:var(--mono);color:var(--muted)">${v.ext}</td><td style="text-align:right;font-family:var(--mono)">${total}</td><td style="text-align:right"><span class="pill ${pCls}">${p}%</span></td></tr>`;}).join('')}
    <tr style="border-top:2px solid var(--border)"><td><b>Total</b></td><td style="text-align:right;font-family:var(--mono);color:${intColor};font-weight:700">${totInt}</td><td style="text-align:right;font-family:var(--mono)">${totExt}</td><td style="text-align:right;font-family:var(--mono)">${totAll}</td><td style="text-align:right"><span class="pill ${pc(totPct)}">${totPct}%</span></td></tr>
    </tbody></table></div>`;
  });
  provHTML+='</div></div>';
  const contribHTML=renderContribExpandable(rows);
  document.getElementById('content').innerHTML=kpiHTML+siteHTML+visHTML+chartMonthHTML+chartDayHTML+momHTML+provHTML+contribHTML;
  setTimeout(()=>{
    dc('cSav');dc('cTrip');dc('cDay');
    const savColors=momRows.map(m=>m.sav>=0?'rgba(34,160,107,.75)':'rgba(226,75,75,.75)');
    CH['cSav']=new Chart(document.getElementById('cSav'),{type:'bar',data:{labels:momRows.map(m=>m.m),datasets:[{data:momRows.map(m=>m.sav),backgroundColor:savColors,borderColor:momRows.map(m=>m.sav>=0?'#22a06b':'#e24b4b'),borderWidth:1.5,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y>=0?'Hemat':'Lebih mahal'}: ${Math.abs(c.parsed.y).toFixed(1)} Jt`}}},scales:{x:{ticks:{color:'#637d9a',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#637d9a',font:{size:11},callback:v=>v+'Jt'},grid:{color:'rgba(0,0,0,.05)'}}}}});
    CH['cTrip']=new Chart(document.getElementById('cTrip'),{type:'bar',data:{labels:momRows.map(m=>m.m),datasets:[{data:momRows.map(m=>m.trips),backgroundColor:'#266CA9',borderRadius:5,borderColor:'#1d5a91',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#637d9a',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#637d9a',font:{size:11}},grid:{color:'rgba(0,0,0,.05)'}}}}});
    CH['cDay']=new Chart(document.getElementById('cDay'),{type:'bar',data:{labels:dailyData.map(d=>d.label),datasets:[{data:dailyData.map(d=>d.avg),backgroundColor:dailyData.map(d=>d.isWeekend?'#a8cde8':'#266CA9'),borderRadius:5,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`Rata-rata: ${c.parsed.y} trip`}}},scales:{x:{ticks:{color:'#637d9a',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#637d9a',font:{size:11}},grid:{color:'rgba(0,0,0,.05)'},beginAtZero:true}},layout:{padding:{top:28}}},plugins:[{id:'dataLabels',afterDatasetsDraw(chart){const{ctx,data}=chart;chart.getDatasetMeta(0).data.forEach((bar,i)=>{const val=data.datasets[0].data[i];if(!val) return;ctx.save();ctx.font='600 11px Plus Jakarta Sans, system-ui';ctx.fillStyle='#22a06b';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(`+${val}`,bar.x,bar.y-4);ctx.restore();});}}]});
  },30);
}
function renderOperational(rows,kpi,contrib,tInt,tAll,pct,sav){
  const jalurAll=activeSite==='all'?NDC.flatMap(s=>{const sr=rows.filter(r=>r[0]===s);return calcJalur(sr).map(j=>({...j,site:s}));}):calcJalur(rows).map(j=>({...j,site:activeSite}));
  const kritis=jalurAll.filter(j=>j.alert==='kritis');
  const warn=jalurAll.filter(j=>j.alert==='warning');
  let alertHTML='';
  if(kritis.length) alertHTML+=`<div class="alert-banner kritis" style="margin-bottom:10px"><span class="alert-icon">🔴</span><div class="alert-content"><div class="alert-title">KRITIS — Cost internal melebihi benchmark external &gt;15%</div><div class="alert-items">${kritis.map(j=>`<span class="alert-tag kritis">${SSHORT[j.site]||j.site}-${j.j} (${j.pct_ef}%)</span>`).join('')}</div></div></div>`;
  if(warn.length) alertHTML+=`<div class="alert-banner" style="margin-bottom:10px"><span class="alert-icon">🟡</span><div class="alert-content"><div class="alert-title">WARNING — Inefisiensi ringan, perlu monitoring</div><div class="alert-items">${warn.map(j=>`<span class="alert-tag warning">${SSHORT[j.site]||j.site}-${j.j} (${j.pct_ef}%)</span>`).join('')}</div></div></div>`;
  const cpdo=kpi.tDO>0?kpi.tCI/kpi.tDO:0;
  const kpiHTML=`<div class="kpi-row">
    <div class="kpi c1"><div class="klbl">Total Trip</div><div class="kval">${fmt(rows.length)}</div><div class="ksub">trip periode ini</div></div>
    <div class="kpi c4"><div class="klbl">% Kontribusi Int</div><div class="kval">${pct}%</div><div class="ksub">${fmt(tInt)} int / ${fmt(tAll)} total</div></div>
    <div class="kpi c3"><div class="klbl">Cost Internal</div><div class="kval">${fmtM(kpi.tCI)}</div><div class="ksub">total Rp</div></div>
    <div class="kpi c2"><div class="klbl">Cost Ext Ref</div><div class="kval">${kpi.tCE>0?fmtM(kpi.tCE):'—'}</div><div class="ksub">benchmark</div></div>
    <div class="kpi c5"><div class="klbl">Savings</div><div class="kval" style="color:${sav>=0?CGREEN:CRED}">${sav>=0?'+':''}${fmtM(sav)}</div><div class="ksub">vs external</div></div>
    <div class="kpi c6"><div class="klbl">Total DO</div><div class="kval">${fmt(kpi.tDO)}</div><div class="ksub">${kpi.tDO>0?'Rp'+fmt(Math.round(cpdo))+'/DO':'—'}</div></div>
  </div>`;
  const sitesToShow=activeSite==='all'?NDC:[activeSite];
  let jalurHTML='';
  sitesToShow.forEach(s=>{
    const sr=rows.filter(r=>r[0]===s);if(!sr.length) return;
    const jalurs=calcJalur(sr);const maxT=jalurs[0]?.t||1;
    jalurHTML+=`<div class="card" style="margin-bottom:12px"><div class="ctitle">${s} <span class="ctitle-badge">${jalurs.length} jalur · ${sr.length} trip</span></div><div class="jalur-wrap"><table class="jtbl"><thead><tr><th>Jalur</th><th>Area</th><th>Trip</th><th>Cost Int (Jt)</th><th>Cost Ext (Jt)</th><th>Gap (Jt)</th><th>Efisiensi</th><th>Status</th></tr></thead><tbody>${jalurs.map(j=>`<tr class="${j.alert?'row-'+j.alert:''}"><td style="font-weight:600">${j.j}</td><td style="color:var(--muted)">${j.area}</td><td><span class="mono">${j.t}</span><div style="width:${Math.round(j.t/maxT*80)}px;height:4px;background:${SCOL[s]||'var(--blue)'};opacity:.5;border-radius:2px;margin-top:3px"></div></td><td style="text-align:right" class="mono">${j.ci}</td><td style="text-align:right" class="mono">${j.ce!==null?j.ce:'<span style="color:var(--muted)">—</span>'}</td><td style="text-align:right">${j.gap!==null?`<span class="${j.gap>=0?'pos':'neg'}">${j.gap>=0?'+':''}${j.gap}</span>`:'<span style="color:var(--muted)">—</span>'}</td><td style="text-align:right">${j.pct_ef!==null?`<span class="${j.pct_ef>=0?'pos':'neg'}">${j.pct_ef>=0?'+':''}${j.pct_ef}%</span>`:'<span style="color:var(--muted)">—</span>'}</td><td style="text-align:center">${j.alert==='kritis'?'<span class="alert-tag kritis">KRITIS</span>':j.alert==='warning'?'<span class="alert-tag warning">WARNING</span>':'<span style="color:var(--green);font-weight:600;font-size:10px">✓ OK</span>'}</td></tr>`).join('')}</tbody></table></div></div>`;
  });
  const at=calcArmtd(rows);
  const armHTML=`<div class="row2">
    <div class="card" style="margin-bottom:0"><div class="ctitle">Distribusi Trip by Armada & Delivery Type</div><div class="leg" id="legArm"></div><div style="position:relative;height:180px"><canvas id="cArm"></canvas></div></div>
    <div class="card" style="margin-bottom:0"><div class="ctitle">Kontribusi Internal per Area</div><div class="leg"><span class="li"><span class="ls" style="background:#266CA9"></span>Internal</span><span class="li"><span class="ls" style="background:#a8cde8"></span>External</span></div><div style="position:relative;height:180px"><canvas id="cArea"></canvas></div></div>
  </div>`;
  document.getElementById('content').innerHTML=alertHTML+kpiHTML+jalurHTML+armHTML;
  setTimeout(()=>{
    dc('cArm');dc('cArea');
    document.getElementById('legArm').innerHTML=at.arms.map((a,i)=>`<span class="li"><span class="ls" style="background:${ACOLS[i%5]}"></span>${a}</span>`).join('');
    CH['cArm']=new Chart(document.getElementById('cArm'),{type:'bar',data:{labels:at.tds,datasets:at.arms.map((arm,i)=>({label:arm,data:at.tds.map(td=>(at.data[arm]||{})[td]||0),backgroundColor:ACOLS[i%5],borderRadius:2}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:'#637d9a',font:{size:10}},grid:{display:false}},y:{stacked:true,ticks:{color:'#637d9a',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}}}}});
    CH['cArea']=new Chart(document.getElementById('cArea'),{type:'bar',data:{labels:contrib.map(c=>c.area),datasets:[{label:'Internal',data:contrib.map(c=>c.int),backgroundColor:'#266CA9',borderRadius:3},{label:'External',data:contrib.map(c=>c.ext),backgroundColor:'#a8cde8',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:'#637d9a',font:{size:10},maxRotation:30},grid:{display:false}},y:{stacked:true,ticks:{color:'#637d9a',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}}}}});
  },50);
}
function calcArmtd(rows){
  const arms=[...new Set(rows.map(r=>r[5]))].sort();
  const tds=[...new Set(rows.map(r=>r[6]))].sort();
  const data={};
  arms.forEach(a=>{data[a]={};tds.forEach(td=>data[a][td]=0);});
  rows.forEach(r=>{if(data[r[5]]) data[r[5]][r[6]]=(data[r[5]][r[6]]||0)+1;});
  return{arms,tds,data};
}
initDateRange();
render();
</script>
</body>
</html>
